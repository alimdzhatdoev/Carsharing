# Основной сценарий демо: UI (Streamlit). API — опционально.
services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs:ro
    environment:
      - STREAMLIT_SERVER_RUN_ON_SAVE=false

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs:ro
    profiles:
      - api
