# Paths relative to project root unless absolute
paths:
  raw_data: "data/raw/trips_demo.csv"
  processed_dir: "data/processed"
  artifacts_dir: "artifacts"
  model_path: "artifacts/models/model.pt"
  preprocessor_path: "artifacts/encoders/preprocessor.joblib"
  metrics_dir: "artifacts/metrics"
  reports_dir: "artifacts/reports"
  training_config_dump: "artifacts/models/training_config.json"
  history_path: "artifacts/metrics/training_history.json"
  confusion_matrix_path: "artifacts/reports/confusion_matrix.png"

data:
  target_column: "target_class"
  test_size: 0.15
  val_size: 0.15  # of remaining after test, i.e. val share of (1-test)
  random_seed: 42

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0
  num_workers: 0

model:
  hidden_layers: [128, 64, 32]
  dropout: 0.2
  use_batch_norm: true
  activation: "relu"  # relu | gelu

inference:
  classification_threshold: 0.5
